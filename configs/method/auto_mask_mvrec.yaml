experiment:
  name: auto_mask_mvrec
  seed: 42

data:
  dataset: mvtec_fs
  manifest: data/manifests/mvtec_fs_train.csv
  image_root: data/mvtec_fs

episode:
  n_way: 5
  k_shot: 1
  q_queries: 5
  episodes: 600

localization:
  method: patchcore
  heatmap_cache_dir: outputs/heatmaps/patchcore

pseudo_mask:
  proposal: adaptive_threshold
  percentiles: [0.85, 0.90, 0.95]
  min_area_ratio: 0.001
  dilation: 8
  confidence: anomaly_mean_area_compactness

features:
  extractor: alpha_clip
  cache_dir: outputs/features/alpha_clip_region_context
  branches: [region, context, global]

classifier:
  type: prototype
  metric: cosine
  normal_suppression: true
  query_adaptive_refinement: false

evaluation:
  metrics: [accuracy, macro_f1, balanced_accuracy]
  compare_to: [whole_image_prototype, roi_crop_prototype, mvrec]